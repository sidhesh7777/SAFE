
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo.png" type="image/png">

<title>Supervisor Login - Sanitation Workers Portal</title>

<style>

/* PAGE BACKGROUND */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e9f2f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}


/* LOGIN CONTAINER */

.login-container{
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:350px;
text-align:center;
}


/* LOGO */

.logo{
width:90px;
margin-bottom:20px;
}


/* TITLE */

h2{
margin-bottom:10px;
color:#1f3a5f;
}

.subtitle{
font-size:14px;
color:#666;
margin-bottom:25px;
}


/* INPUT FIELD */

input{
width:100%;
padding:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:4px;
font-size:15px;
}


/* LOGIN BUTTON */

button{
width:100%;
padding:10px;
background:#1f3a5f;
color:white;
border:none;
border-radius:4px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2f5d8a;
}


/* FOOTER */

.footer{
margin-top:20px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>



<div class="login-container">


<!-- LOGO -->

<img src="logo.png" class="logo">



<h2>Supervisor Login</h2>

<p class="subtitle">Sanitation Workers Monitoring Portal</p>



<!-- PHONE LOGIN -->


<label>Supervisor Name</label>
<input type="text" id="supervisorName" placeholder="Enter Supervisor Name">

<label>Phone Number</label>
<input type="tel" id="phoneNumber" placeholder="Enter Phone Number">

<button id="loginBtn" onclick="login()">Login</button>



<div class="footer">

Municipal Sanitation Department  
<br>
Government Worker Monitoring System

</div>


</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL = "https://mtizzberatdiejzpozds.supabase.co";
const SUPABASE_KEY = "sb_publishable_ClaMyLJYxVyKaVyGjynNRw_xnUZRrsF";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login(){
  const supervisor = document.getElementById("supervisorName").value.trim();
  const phone = document.getElementById("phoneNumber").value.trim();

  if (!supervisor || !phone) {
    alert("Please fill all details");
    return;
  }

  const phoneValue = phone.match(/^\d+$/) ? Number(phone) : phone;
  const { data, error } = await supabaseClient
    .from('supervisors')
    .select('id,name,phone')
    .eq('phone', phoneValue)
    .ilike('name', `%${supervisor}%`)
    .limit(1);

  console.log('login query', { supervisor, phone, data, error });

  if (error) {
    console.error(error);
    alert('Login error: ' + (error.message || 'Check console'));
    return;
  }

  if (!data || data.length === 0) {
    alert('Invalid credentials. Please check your supervisor table and data values exactly.');
    return;
  }

  window.location.href = 'home.html';
}
</script>



</body>

</html>
